name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/minipot \
             minipot-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: minipot-x86_64-unknown-linux-gnu

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-pc-windows-gnu/release/minipot.exe \
             minipot-x86_64-pc-windows-gnu.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: minipot-x86_64-pc-windows-gnu.exe

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            minipot-x86_64-unknown-linux-gnu
            minipot-x86_64-pc-windows-gnu.exe
