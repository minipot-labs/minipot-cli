name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  version:
    name: Read version from Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: read
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo.toml
        run: |
          TAG="${{ github.ref_name }}"
          EXPECTED="v${{ steps.read.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag $TAG does not match Cargo.toml version $EXPECTED"
            exit 1
          fi

  build-linux:
    name: Build Linux
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/minipot \
             minipot-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: minipot-x86_64-unknown-linux-gnu

  build-windows:
    name: Build Windows
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-pc-windows-gnu/release/minipot.exe \
             minipot-x86_64-pc-windows-gnu.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: minipot-x86_64-pc-windows-gnu.exe

  release:
    name: Create Release
    needs: [version, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
          files: |
            minipot-x86_64-unknown-linux-gnu
            minipot-x86_64-pc-windows-gnu.exe
